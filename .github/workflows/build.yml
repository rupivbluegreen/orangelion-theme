name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Least privilege by default; the release job elevates its own permissions.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Lint workflows (actionlint)
        run: |
          curl -sSL "https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz" | tar -xz actionlint
          ./actionlint -color
      - name: Lint CSS
        run: |
          npm install --no-save stylelint@16 stylelint-config-recommended@14
          npx stylelint "orangelion.css"

  build:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        guac: ["1.5.5", "1.6.0"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build extension jar
        run: ./build.sh

      - name: Smoke test that the extension loads
        env:
          GUAC_TAG: ${{ matrix.guac }}
        run: |
          mkdir -p gh/extensions
          cp dist/guacamole-theme-orangelion.jar gh/extensions/
          docker run -d --name guac \
            -e GUACD_HOSTNAME=localhost -e GUACAMOLE_HOME=/gh \
            -v "$PWD/gh:/gh:ro" "guacamole/guacamole:${GUAC_TAG}"
          for i in $(seq 1 90); do
            docker logs guac 2>&1 | grep -q "Server startup in" && break
            sleep 2
          done
          if docker logs guac 2>&1 | grep -q 'Extension "OrangeLion Theme" (orangelion) loaded'; then
            echo "OrangeLion theme loaded on Guacamole ${GUAC_TAG}"
          else
            echo "OrangeLion theme did not load on Guacamole ${GUAC_TAG}"
            docker logs guac
            exit 1
          fi

      - name: Upload jar as a build artifact
        if: matrix.guac == '1.6.0'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: guacamole-theme-orangelion
          path: dist/guacamole-theme-orangelion.jar

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build extension jar
        run: ./build.sh

      - name: Generate SHA-256 checksum
        working-directory: dist
        run: sha256sum guacamole-theme-orangelion.jar > guacamole-theme-orangelion.jar.sha256

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/guacamole-theme-orangelion.jar

      - name: Attach jar and checksum to the Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            dist/guacamole-theme-orangelion.jar
            dist/guacamole-theme-orangelion.jar.sha256
          generate_release_notes: true
